<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Receptenkast{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <a class="brand" href="{{ url_for('index') }}">
    <span class="brand-mark">REC</span><span class="brand-name">Receptenkast</span>
  </a>
  <a class="btn btn-accent" href="{{ url_for('new_recipe') }}">+ Nieuw recept</a>
</header>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash-wrap">
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    </div>
  {% endif %}
{% endwith %}

<main class="page">
{% block content %}{% endblock %}
</main>
</body>
</html>
